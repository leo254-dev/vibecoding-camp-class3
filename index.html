<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>記帳工具 (Google Sheets)</title>
  <link rel="stylesheet" href="./styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer onload="onGisLoaded()"></script>
</head>

<body>
  <header class="container">
    <div class="row space-between center">
      <h1>記帳工具</h1>
      <div class="row gap">
        <button id="btnSignIn" class="btn primary" disabled>登入 Google</button>
        <button id="btnSignOut" class="btn" disabled>登出</button>
      </div>
    </div>
    <p class="muted">資料來源：Google 試算表「記帳紀錄」「欄位表」</p>
  </header>

  <main class="container grid">
    <section class="card">
      <h2>新增記帳</h2>

      <form id="recordForm" class="form">
        <div class="grid2">
          <label>
            日期
            <input id="fDate" type="date" required />
          </label>

          <label>
            類型
            <select id="fType" required>
              <option value="支出">支出</option>
              <option value="收入">收入</option>
            </select>
          </label>
        </div>

        <div class="grid2">
          <label>
            分類
            <select id="fCategory" required></select>
          </label>

          <label>
            付款方式
            <select id="fPayment" required></select>
          </label>
        </div>

        <div class="grid2">
          <label>
            金額
            <input id="fAmount" type="number" min="0" step="1" inputmode="numeric" required />
          </label>

          <label>
            說明
            <input id="fDescription" type="text" placeholder="例如：早餐、房租、薪資" required />
          </label>
        </div>

        <div class="row gap">
          <button id="btnSubmit" class="btn primary" type="submit" disabled>新增</button>
          <button id="btnReload" class="btn" type="button" disabled>重新讀取本月資料</button>
        </div>

        <p id="status" class="status muted"></p>
      </form>
    </section>

    <section class="card">
      <div class="row space-between center">
        <h2>每月概覽</h2>
        <div class="row gap center">
          <label class="row gap center">
            月份
            <input id="monthPicker" type="month" disabled />
          </label>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="muted">收入</div>
          <div id="sumIncome" class="big">0</div>
        </div>
        <div class="stat">
          <div class="muted">支出</div>
          <div id="sumExpense" class="big">0</div>
        </div>
        <div class="stat">
          <div class="muted">結餘</div>
          <div id="sumNet" class="big">0</div>
        </div>
      </div>

      <div class="chart-box">
        <canvas id="categoryChart"></canvas>
      </div>

      <h3>支出分類細節</h3>
      <div id="categoryBreakdown" class="breakdown"></div>
    </section>

    <section class="card full">
      <div class="row space-between center">
        <h2>本月每日收支趨勢</h2>
        <div class="row gap">
          <button id="btnRefresh" class="btn" disabled>刷新</button>
        </div>
      </div>
      <div class="daily-chart-container">
        <canvas id="dailyBarChart"></canvas>
      </div>
    </section>
  </main>

  <footer class="container footer muted">
    <small>Tips：滑動長條圖可查看每日詳細金額。</small>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
